# Mafia Tumbada Oficial — API on Render (Bun + Turso / libsql)
# Docs: https://docs.render.com/blueprint-spec
# After connecting the repo, set secret env vars in the Render Dashboard (sync: false).

services:
  - type: web
    name: mto-api
    runtime: node
    # Bun CLI ships with Render's Node env today, not guaranteed forever — after Node/env upgrades, verify `bun --version` in Shell. Full checklist: DEPLOY.md §1 "Bun on Render (Node runtime)".

    buildCommand: bun install --frozen-lockfile
    # Migrations + schema check at startup. DB is Turso (remote libsql) — no persistent disk on the web service.
    startCommand: bun run migrate && bun run check-db && bun run start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PRODUCTION_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BOOKING_NOTIFICATION_EMAIL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # Clerk Dashboard → Users → User ID (matches JWT `sub`). Gates `is_admin` on insert + sync on read.
      - key: ADMIN_CLERK_ID
        sync: false
      # Same value on **mto-drip-cron**; gates POST /api/internal/process-drip
      - key: DRIP_CRON_SECRET
        sync: false

    healthCheckPath: /health

  # Drip worker hits the API over HTTPS (Bearer DRIP_CRON_SECRET) — same as SQLite-on-disk layout.
  - type: cron
    name: mto-drip-cron
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: "echo noop"
    startCommand: 'curl -sf -X POST -H "Authorization: Bearer $DRIP_CRON_SECRET" "$DRIP_PROCESS_URL"'
    envVars:
      - key: DRIP_CRON_SECRET
        sync: false
      # Full URL, e.g. https://mto-api.onrender.com/api/internal/process-drip
      - key: DRIP_PROCESS_URL
        sync: false
