# Mafia Tumbada Oficial — API on Render (Bun + SQLite)
# Docs: https://docs.render.com/blueprint-spec
# After connecting the repo, set secret env vars in the Render Dashboard (sync: false).

services:
  - type: web
    name: mto-api
    runtime: node
    # Bun CLI ships with Render's Node env today, not guaranteed forever — after Node/env upgrades, verify `bun --version` in Shell. Full checklist: DEPLOY.md §1 "Bun on Render (Node runtime)".

    buildCommand: bun install --frozen-lockfile
    # Migrations + schema check at startup (disk only at runtime). Longer doc: DEPLOY.md §1.
    startCommand: bun run migrate && bun run check-db && bun run start

    disk:
      name: data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /data/sqlite.db
      - key: FRONTEND_URL
        sync: false
      - key: PRODUCTION_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BOOKING_NOTIFICATION_EMAIL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # Same value on **mto-drip-cron**; gates POST /api/internal/process-drip
      - key: DRIP_CRON_SECRET
        sync: false

    healthCheckPath: /health

  # SQLite lives on **mto-api** disk only — cron cannot run migrate against that file.
  # This job calls the API over HTTPS (Bearer DRIP_CRON_SECRET).
  - type: cron
    name: mto-drip-cron
    runtime: node
    schedule: "*/15 * * * *"
    buildCommand: "echo noop"
    startCommand: 'curl -sf -X POST -H "Authorization: Bearer $DRIP_CRON_SECRET" "$DRIP_PROCESS_URL"'
    envVars:
      - key: DRIP_CRON_SECRET
        sync: false
      # Full URL, e.g. https://mto-api.onrender.com/api/internal/process-drip
      - key: DRIP_PROCESS_URL
        sync: false
