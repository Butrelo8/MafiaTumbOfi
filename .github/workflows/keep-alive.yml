name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://mafiatumbadaofi.onrender.com)
          echo "Status: $response"

          if [ "$response" != "200" ]; then
            echo "::error::Backend returned $response — may be down"
            exit 1
          fi